name: Preview Testnet

on:
  pull_request:
    branches:
      - develop
      - release/*
    types: [ opened, synchronize, reopened, closed ]
  delete:

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  ENV: "stg"
  APP: "aescan-testnet"

concurrency: aescan_staging_environment-${{ github.ref }}

jobs:
  main:
    runs-on: ubuntu-latest
    name: build
    if: github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'reopened'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Docker Buildx
        id: buildx
        # Use the action from the master, as we've seen some inconsistencies with @v1
        # Issue: https://github.com/docker/build-push-action/issues/286
        uses: docker/setup-buildx-action@master

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          # Key is named differently to avoid collision
          key: ${{ runner.os }}-${{ env.ENV }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ env.ENV }}-buildx

      - name: Log in to dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}

      - name: Extract metadata for docker
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: aeternity/aescan
          tags: |
            type=ref,event=pr

      - name: Create dotenv
        run: |
          echo APP_VERSION=$(git describe --tags)-preview >> .env

      - name: Build and push docker image
        uses: docker/build-push-action@v6.9.0
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: BUILD_MODE=development
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,mode=max,dest=/tmp/.buildx-cache-new

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  stg_deploy:
    runs-on: ubuntu-latest
    name: PR deploy
    needs: main
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v5
        with:
          repository: aeternity/gitops-apps-aelabs.git
          ref: stg
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 0

      - name: Check the initial PR deployment status
        continue-on-error: true
        id: status
        uses: aeternity/ae-github-actions/deploy-status@v7.4.0
        with:
          url: https://pr-${{ env.PR_NUMBER }}-${{ env.APP }}.${{ env.ENV }}.service.aepps.com
          timeout: 10

      - name: Staging deploy
        if: github.event.action == 'opened' || github.event.action == 'reopened' || steps.status.outputs.status_code != '200'
        uses: aeternity/ae-github-actions/argocd-deploy@v7.4.0
        with:
          url-prefix: pr-${{ env.PR_NUMBER }}
          env: ${{ env.ENV }}
          app: ${{ env.APP }}

      - name: Staging PR Sync
        if: github.event.action == 'synchronize'
        uses: aeternity/ae-github-actions/argocd-pr-sync@v7.4.0
        with:
          git-sha: ${{ github.sha }}
          url-prefix: pr-${{ env.PR_NUMBER }}
          env: ${{ env.ENV }}
          app: ${{ env.APP }}

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          repository: aeternity/gitops-apps-aelabs
          github_token: ${{ secrets.BOT_GITHUB_TOKEN }}
          branch: stg

      - name: Wait for the deployment to go live
        uses: aeternity/ae-github-actions/deploy-status@v7.4.0
        with:
          url: https://pr-${{ env.PR_NUMBER }}-${{ env.APP }}.${{ env.ENV }}.service.aepps.com
          timeout: 300
          interval: 5

      - name: Print PR url
        uses: unsplash/comment-on-pr@v1.3.0
        if: github.event.action == 'opened'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          msg: |
            ## 🧪️ Preview Links 🔎️
            Mainnet: https://pr-${{ env.PR_NUMBER }}-aescan.${{ env.ENV }}.service.aepps.com
            Testnet: https://pr-${{ env.PR_NUMBER }}-aescan-testnet.${{ env.ENV }}.service.aepps.com
          check_for_duplicate_msg: true

  stg_undeploy:
    runs-on: ubuntu-latest
    name: PR undeploy on close or branch delete
    if: (github.event_name == 'pull_request' && github.event.action == 'closed') || (github.event_name == 'delete' && github.event.ref_type == 'branch')
    steps:
      - name: Extract PR number from branch on delete
        if: github.event_name == 'delete'
        id: extract-pr
        shell: bash
        run: |
          BRANCH_NAME="${{ github.event.ref }}"
          echo "Deleted branch: $BRANCH_NAME"
          PR_NUMBER=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:$BRANCH_NAME&state=all" \
            | jq -r '.[0].number // empty')
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "Found PR number: $PR_NUMBER"
            echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "No PR number found for branch $BRANCH_NAME"
            echo "PR_NUMBER=" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v5
        with:
          repository: aeternity/gitops-apps-aelabs.git
          ref: stg
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 0

      - name: Staging undeploy
        if: (startsWith(github.head_ref, 'release') != true) && ((github.event_name == 'pull_request') || (github.event_name == 'delete' && steps.extract-pr.outputs.PR_NUMBER != ''))
        uses: aeternity/ae-github-actions/argocd-undeploy@v7.4.0
        with:
          url-prefix: pr-${{ github.event_name == 'delete' && steps.extract-pr.outputs.PR_NUMBER || env.PR_NUMBER }}
          env: ${{ env.ENV }}
          app: ${{ env.APP }}

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          repository: aeternity/gitops-apps-aelabs
          github_token: ${{ secrets.BOT_GITHUB_TOKEN }}
          branch: stg

  end-to-end-tests:
    needs: stg_deploy
    runs-on: ubuntu-22.04
    name: E2E Tests
    timeout-minutes: 20
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cypress run
        uses: cypress-io/github-action@v6.7.16
        with:
          config: baseUrl=https://pr-${{ env.PR_NUMBER }}-${{ env.APP }}.${{ env.ENV }}.service.aepps.com
